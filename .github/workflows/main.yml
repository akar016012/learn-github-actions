name: Test Project
on: 
    push: 
        branches:
            - main
    workflow_dispatch:
jobs:
    vite-test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Install NodeJS
              uses: actions/setup-node@v4
              with:
                  node-version: 20
            - name: Install dependencies
              run: npm ci
            - name: Run tests
              run: npm test
    deploy:
        needs: vite-test
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v4
          - name: Install NodeJS
            uses: actions/setup-node@v4
            with:
                node-version: 20
          - name: Install dependencies
            run: npm ci
          - name: Build Project
            run: npm run build
          - name: deploy
            run: echo "Deploying..."
